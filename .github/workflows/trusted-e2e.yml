name: Trusted E2E Tests

# Runs the live secret-backed `tests/e2e/` suite for fork PRs only after
# a maintainer has approved the PR. This stays advisory: it posts a
# separate `Trusted E2E Tests` commit status that is not part of
# merge-ready's REQUIRED list, so community PRs get signal without
# changing the merge gate.
#
# Triggers:
#   pull_request_target  Re-check whether a fork PR is already trusted on
#                        open / sync / reopen / ready_for_review. Uses the
#                        base-branch workflow definition and checks out the
#                        PR head SHA only after trust is established.
#   workflow_dispatch    Explicit kick from maintainer-approval-rerun-run.yml
#                        when a maintainer approval lands on an already-open
#                        fork PR whose trusted workflow has not run yet.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ['ap-web/**']
  workflow_dispatch:
    inputs:
      pull_number:
        description: "Fork PR number to run trusted e2e against"
        required: true

concurrency:
  group: trusted-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pull_number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OMNIGENT_SKIP_WEB_UI: "true"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  CODEX: ""
  CLAUDE_CODE: ""

jobs:
  resolve:
    name: resolve
    if: ${{ github.event_name != 'pull_request_target' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    outputs:
      pull_number: ${{ steps.pr.outputs.pull_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      force_all_tests: ${{ steps.pr.outputs.force_all_tests }}
      allowed: ${{ steps.trust.outputs.allowed }}
      reason: ${{ steps.trust.outputs.reason }}
    steps:
      - name: Check out scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pull_number }}
        run: |
          echo "pull_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          gh api "repos/$REPO/pulls/$PR_NUMBER" \
            --jq '"head_sha=\(.head.sha)\nhead_repo=\(.head.repo.full_name)\nforce_all_tests=\(.labels | map(.name) | index("force-all-tests") != null)"' >> "$GITHUB_OUTPUT"

      - name: Load maintainers
        id: maintainers
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/merge-ready/load-maintainers.sh

      - name: Determine trust
        id: trust
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pull_number }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
          MAINTAINERS: ${{ steps.maintainers.outputs.list }}
        run: bash .github/scripts/trusted-pr/eligibility.sh

      - name: Post pending status
        if: steps.trust.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.pr.outputs.head_sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state="pending" \
            -f context="Trusted E2E Tests" \
            -f description="Running trusted fork-PR e2e" \
            -f target_url="$TARGET_URL" >/dev/null

  e2e:
    name: Trusted E2E Tests (shard ${{ matrix.shard_id }}/${{ matrix.num_shards }})
    needs: resolve
    if: needs.resolve.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - shard_id: 0
            num_shards: 4
          - shard_id: 1
            num_shards: 4
          - shard_id: 2
            num_shards: 4
          - shard_id: 3
            num_shards: 4

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Cache virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('.python-version') }}-${{ hashFiles('uv.lock') }}

      - name: Set LLM credentials
        run: echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> "$GITHUB_ENV"

      - name: Write gateway profile (~/.databrickscfg)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          host="${GATEWAY_BASE_URL%/serving-endpoints}"
          cat > "$HOME/.databrickscfg" <<EOF
          [default]
          host  = $host
          token = $LLM_API_KEY
          EOF
          echo "DATABRICKS_BEARER=$LLM_API_KEY" >> "$GITHUB_ENV"

      - name: Install project and dev dependencies
        run: uv sync --extra all --extra dev

      - name: Install binary dependencies
        working-directory: .github/ci-deps
        run: |
          sudo apt-get install -y tmux bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          npm install --ignore-scripts
          node node_modules/@anthropic-ai/claude-code/install.cjs
          echo "${GITHUB_WORKSPACE}/.github/ci-deps/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run e2e tests
        timeout-minutes: 30
        env:
          PARALLELISM_INPUT: "2"
          SHARD_ID: ${{ matrix.shard_id }}
          NUM_SHARDS: ${{ matrix.num_shards }}
          FORCE_ALL_TESTS: ${{ needs.resolve.outputs.force_all_tests }}
          NIGHTLY_FULL: "false"
          E2E_TMP_BASE: /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}
          PYTEST_PROGRESS_LOG_DIR: /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/progress
          OMNIGENT_TOKEN_USAGE_JSON: /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/tokens.json
          OMNIGENT_TEST_MODEL_SPREAD: '1'
          OMNIGENT_TEST_MODEL_POOL_GPT: 'databricks-gpt-5-5,databricks-gpt-5-4-mini'
        run: |
          if ! [[ "$PARALLELISM_INPUT" =~ ^[1-9][0-9]?$ ]]; then
            echo "Invalid parallelism input: $PARALLELISM_INPUT (expected 1-99)" >&2
            exit 1
          fi
          WORKERS="$PARALLELISM_INPUT"
          mkdir -p "$E2E_TMP_BASE"

          EXTRA_ARGS=()
          if [[ "$FORCE_ALL_TESTS" == "true" ]]; then
            EXTRA_ARGS=(--no-skip-known)
            echo "::notice::force-all-tests label present; bypassing tests/known_failures.yaml"
          fi
          if [[ "$NIGHTLY_FULL" != "true" ]]; then
            EXTRA_ARGS+=(-m "not nightly")
          fi

          uv run pytest tests/e2e/ \
            --llm-api-key "$LLM_API_KEY" \
            --profile default \
            --harness databricks \
            -n "$WORKERS" \
            --dist=loadscope \
            --max-worker-restart=0 \
            --shard-id="$SHARD_ID" \
            --num-shards="$NUM_SHARDS" \
            --timeout=180 \
            --timeout-method=thread \
            --basetemp="$E2E_TMP_BASE" \
            --junitxml="$E2E_TMP_BASE/junit.xml" \
            -v --tb=long --showlocals --log-level=INFO -r a \
            "${EXTRA_ARGS[@]}" \
            || { rc=$?; [ "$rc" -eq 5 ] && echo "::notice::No tests collected in this shard; treating as a pass." || exit "$rc"; }

      - name: Upload server logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: trusted-e2e-server-logs-${{ github.run_id }}-shard${{ matrix.shard_id }}
          path: |
            /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/**/server.log
            /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/**/runner.log
            /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/**/.omnigent/logs/**/*.log
            /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/junit.xml
            /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/progress/progress-*.log
          retention-days: 7
          if-no-files-found: warn
          include-hidden-files: true

      - name: Upload token usage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: trusted-e2e-tokens-${{ github.run_id }}-shard${{ matrix.shard_id }}
          path: /tmp/omnigent-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/tokens*.json
          retention-days: 14
          if-no-files-found: warn

  report:
    name: report
    needs: [resolve, e2e]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ needs.resolve.outputs.head_sha }}
      TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ALLOWED: ${{ needs.resolve.outputs.allowed }}
      REASON: ${{ needs.resolve.outputs.reason }}
      E2E_RESULT: ${{ needs.e2e.result }}
    steps:
      - name: Post final status
        run: |
          if [[ "$ALLOWED" != "true" ]]; then
            echo "Trusted e2e not eligible: $REASON"
            exit 0
          fi

          STATE=success
          DESC="Trusted fork-PR e2e passed"
          if [[ "$E2E_RESULT" == "failure" ]]; then
            STATE=failure
            DESC="Trusted fork-PR e2e failed"
          elif [[ "$E2E_RESULT" == "cancelled" ]]; then
            STATE=error
            DESC="Trusted fork-PR e2e cancelled"
          fi

          gh api "repos/$REPO/statuses/$SHA" \
            -f state="$STATE" \
            -f context="Trusted E2E Tests" \
            -f description="$DESC" \
            -f target_url="$TARGET_URL" >/dev/null
