name: Benchmark (Release)

# Benchmark regression gate for release branches. Triggered automatically on
# push to release/v* branches (so it runs whenever release.yml creates or
# updates a release branch), and dispatchable for ad-hoc checks.
#
# Runs SQLite + Postgres (both are affected equally by schema migrations; MySQL
# is skipped for speed). Downloads the latest nightly artifact for each backend
# as baseline and compares using compare.py. Writes a step summary with the
# full comparison table.
#
# Exits 1 on regression unless block_on_regression is false (dry-run mode).

on:
  push:
    branches:
      - "release/v[0-9]*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to benchmark (default: current ref)"
        required: false
        default: ""
      block_on_regression:
        description: "Fail the job if a regression is detected"
        required: false
        default: "true"
  workflow_call:
    inputs:
      ref:
        description: "Branch or tag to benchmark"
        type: string
        required: false
        default: ""
      block_on_regression:
        description: "Fail the job if a regression is detected"
        type: string
        required: false
        default: "true"

permissions:
  contents: read

env:
  OMNIGENT_SKIP_WEB_UI: "true"
  UV_INDEX_URL: https://pypi.org/simple
  PIP_INDEX_URL: https://pypi.org/simple
  ITERATIONS: "100"
  RUNS: "3"
  SESSIONS: "2000"
  ITEMS: "100"

concurrency:
  group: benchmark-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark-release:
    name: Benchmark regression check (${{ matrix.backend }})
    if: github.repository == 'omnigent-ai/omnigent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgres]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: bench
          POSTGRES_DB: benchdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra databricks

      - name: Resolve DB target
        id: db
        run: |
          if [[ "${{ matrix.backend }}" == "postgres" ]]; then
            echo "uri=postgresql+psycopg://postgres:bench@localhost:5432/benchdb" >> "$GITHUB_OUTPUT"
          else
            echo "uri=sqlite:///$PWD/bench.db" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore seeded SQLite corpus
        if: matrix.backend == 'sqlite'
        id: seedcache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: bench.db
          key: benchdb-sqlite-release-${{ hashFiles('dev/benchmarks/omnigent/seed.py', 'omnigent/db/migrations/**') }}-${{ env.SESSIONS }}x${{ env.ITEMS }}

      - name: Seed corpus
        if: matrix.backend != 'sqlite' || steps.seedcache.outputs.cache-hit != 'true'
        run: |
          uv run --no-sync dev/benchmarks/omnigent/seed.py \
            --database-uri "${{ steps.db.outputs.uri }}" \
            --sessions "$SESSIONS" --items-per-session "$ITEMS"

      - name: Run benchmark (candidate)
        run: |
          uv run --no-sync dev/benchmarks/omnigent/run.py \
            --database-uri "${{ steps.db.outputs.uri }}" \
            --iterations "$ITERATIONS" \
            --runs "$RUNS" \
            --output "candidate-${{ matrix.backend }}.json"

      - name: Download latest nightly baseline (${{ matrix.backend }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RUN_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/benchmark.yml/runs?status=success&branch=main&per_page=10" \
            --jq '.workflow_runs[0].id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No successful nightly benchmark run found — skipping comparison."
            echo "BASELINE_FOUND_${{ matrix.backend }}=false" >> "$GITHUB_ENV"
            exit 0
          fi
          ARTIFACT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("benchmark-results-${{ matrix.backend }}-")) | .id' \
            | head -1)
          if [ -z "$ARTIFACT_ID" ]; then
            echo "No ${{ matrix.backend }} artifact found on run ${RUN_ID} — skipping comparison."
            echo "BASELINE_FOUND_${{ matrix.backend }}=false" >> "$GITHUB_ENV"
            exit 0
          fi
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "baseline-${{ matrix.backend }}.zip" && \
          unzip -q "baseline-${{ matrix.backend }}.zip" -d "baseline_${{ matrix.backend }}_dir" && \
          mv "baseline_${{ matrix.backend }}_dir"/*.json "baseline-${{ matrix.backend }}.json" && \
          echo "BASELINE_FOUND_${{ matrix.backend }}=true" >> "$GITHUB_ENV" || \
          (echo "BASELINE_FOUND_${{ matrix.backend }}=false" >> "$GITHUB_ENV"; \
           echo "Artifact download failed — skipping comparison.")

      - name: Compare baseline vs candidate (${{ matrix.backend }})
        id: compare
        run: |
          BASELINE_VAR="BASELINE_FOUND_${{ matrix.backend }}"
          if [ "${!BASELINE_VAR}" != "true" ]; then
            echo "Skipping comparison — no baseline available."
            echo "COMPARE_EXIT_CODE=0" >> "$GITHUB_ENV"
            echo "BASELINE_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "BASELINE_AVAILABLE=true" >> "$GITHUB_ENV"
          set +e
          uv run --no-sync dev/benchmarks/omnigent/compare.py \
            --baseline "baseline-${{ matrix.backend }}.json" \
            --candidate "candidate-${{ matrix.backend }}.json" \
            --backend "${{ matrix.backend }}" \
            --threshold 0.20 \
            --output-markdown "comparison-${{ matrix.backend }}.md"
          echo "COMPARE_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Write step summary
        run: |
          {
            echo "## Benchmark regression check — ${{ matrix.backend }}"
            echo ""
            echo "**Ref:** \`${{ inputs.ref || github.ref }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            if [ "$BASELINE_AVAILABLE" = "true" ] && [ -f "comparison-${{ matrix.backend }}.md" ]; then
              cat "comparison-${{ matrix.backend }}.md"
            else
              echo "No nightly baseline found — comparison skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload candidate results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmark-release-${{ matrix.backend }}-${{ github.run_id }}
          path: candidate-${{ matrix.backend }}.json
          retention-days: 30
          if-no-files-found: warn

      - name: Fail on regression
        if: >-
          env.BASELINE_AVAILABLE == 'true' &&
          env.COMPARE_EXIT_CODE == '1' &&
          inputs.block_on_regression != 'false'
        run: |
          echo "Benchmark regression detected on ${{ matrix.backend }}. See step summary for details."
          exit 1
